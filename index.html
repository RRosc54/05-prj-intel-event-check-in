<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Intel Sustainability Summit Check-In</title>

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Hero section with Intel branding -->
    <header class="hero">
      <div class="hero-content">
        <img src="img/intel-logo.svg" alt="Intel Logo" class="intel-logo" />
        <h1>Team Sustainability Summit</h1>
        <div class="hero-divider"></div>
        <p>
          <i class="fas fa-leaf"></i>
          Check-in system for sustainability event attendees
        </p>
      </div>
    </header>

    <!-- Attendance tracking -->
    <section class="attendance-tracker">
      <div class="attendance-header">
        <i class="fas fa-users"></i>
        Attendance:
        <span id="attendeeCount">0</span>/50
      </div>

      <div class="progress-container">
        <div
          id="progressBar"
          class="progress-bar"
          role="progressbar"
          aria-valuemin="0"
          aria-valuemax="50"
          aria-valuenow="0"
        >
          0%
        </div>
      </div>

      <p id="progressText" class="progress-text">0% of goal completed</p>
    </section>

    <main class="container">
      <!-- Feedback message -->
      <p id="greeting" class="message hidden"></p>

      <!-- Celebration message -->
      <p id="celebrationMessage" class="celebration-message hidden"></p>

      <!-- Check-in form -->
      <form class="check-in" id="checkInForm">
        <label for="attendeeName" class="form-label">Attendee Check-In</label>

        <div class="form-group">
          <div class="input-wrapper">
            <input
              type="text"
              id="attendeeName"
              name="attendeeName"
              placeholder="Enter name..."
              required
            />

            <select id="teamSelect" name="team" required>
              <option value="" disabled selected>Select Team...</option>
              <option value="water">Team Water Wise</option>
              <option value="zero">Team Net Zero</option>
              <option value="power">Team Renewables</option>
            </select>
          </div>

          <button type="submit" id="checkInBtn">
            <i class="fas fa-user-check"></i>
            Check In
          </button>
        </div>
      </form>

      <!-- Team stats -->
      <section class="team-stats">
        <h2>Team Attendance</h2>

        <div class="teams-grid">
          <div class="team-card water" data-team="water">
            <span class="team-name">🌊 Team Water Wise</span>
            <span class="team-count" id="waterCount">0</span>
          </div>

          <div class="team-card zero" data-team="zero">
            <span class="team-name">🌿 Team Net Zero</span>
            <span class="team-count" id="zeroCount">0</span>
          </div>

          <div class="team-card power" data-team="power">
            <span class="team-name">⚡ Team Renewables</span>
            <span class="team-count" id="powerCount">0</span>
          </div>
        </div>
      </section>

      <!-- Attendee list -->
      <section class="attendee-list-section">
        <h2>Attendee List</h2>
        <ul id="attendeeList" class="attendee-list"></ul>
      </section>

      <!-- Optional reset button for testing localStorage -->
      <button type="button" id="resetBtn" class="reset-btn">
        Clear Saved Progress
      </button>
    </main>

    <footer class="footer">
      &copy; 2025 Intel •
      <a
        href="https://www.intel.com/content/www/us/en/corporate-responsibility/2030-goals.html"
        class="footer-link"
      >
        Sustainability Goals
      </a>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
